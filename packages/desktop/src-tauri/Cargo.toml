[package]
name = "linkdrive"
version = "0.1.0"
description = "LinkDrive — fast cross-device file explorer"
authors = ["redakarimi"]
edition = "2021"

[lib]
name = "linkdrive_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }
winresource = "0.1"

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
dirs = "5"
russh = "0.52"
russh-sftp = "2.1"
sha2 = "0.10"
base64 = "0.22"
png = "0.17"

[target.'cfg(windows)'.dependencies]
winreg = "0.55"
mslnk = "0.1"
winapi = { version = "0.3", features = [
    "shellapi",
    "winuser",
    "wingdi",
    "fileapi",
    "handleapi",
    "libloaderapi",
    "errhandlingapi",
    "winbase",
] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
